<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="5">
    <title>APP_DISPLAY_NAME — Deploying</title>
    <style>
        /* --- Reset & Base --- */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --surface: #0a0a0a;
            --surface-raised: #111111;
            --surface-border: #1a1a1a;
            --text-primary: #e8e4df;
            --text-secondary: #6b6560;
            --text-dim: #3a3632;
            --accent: #c4956a;
            --accent-glow: rgba(196, 149, 106, 0.08);
            --pulse-ring: rgba(196, 149, 106, 0.15);
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--surface);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow: hidden;
        }

        /* --- Ambient grid texture --- */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--surface-border) 1px, transparent 1px),
                linear-gradient(90deg, var(--surface-border) 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.3;
            mask-image: radial-gradient(ellipse 50% 50% at 50% 50%, black 20%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse 50% 50% at 50% 50%, black 20%, transparent 70%);
            pointer-events: none;
        }

        /* --- Main content --- */
        .deploy-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            max-width: 520px;
            width: 100%;
        }

        /* --- Pulse beacon --- */
        .beacon {
            position: relative;
            width: 64px;
            height: 64px;
            margin-bottom: 2.5rem;
        }

        .beacon::before,
        .beacon::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 1.5px solid var(--accent);
        }

        .beacon::before {
            animation: beacon-ping 2.4s cubic-bezier(0, 0, 0.2, 1) infinite;
        }

        .beacon::after {
            animation: beacon-ping 2.4s cubic-bezier(0, 0, 0.2, 1) infinite 0.8s;
        }

        .beacon-core {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            transform: translate(-50%, -50%);
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--pulse-ring), 0 0 40px var(--accent-glow);
            animation: core-breathe 2.4s ease-in-out infinite;
        }

        @keyframes beacon-ping {
            0% { transform: scale(0.3); opacity: 0.8; }
            100% { transform: scale(1.2); opacity: 0; }
        }

        @keyframes core-breathe {
            0%, 100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
        }

        /* --- App label --- */
        .app-label {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.75rem;
            opacity: 0.9;
        }

        /* --- Heading --- */
        .heading {
            font-size: clamp(1.4rem, 4vw, 1.8rem);
            font-weight: 600;
            letter-spacing: -0.02em;
            line-height: 1.3;
            text-align: center;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        /* --- Body copy --- */
        .body-text {
            font-size: 0.95rem;
            line-height: 1.7;
            color: var(--text-secondary);
            text-align: center;
            max-width: 380px;
        }

        /* --- Status bar --- */
        .status-bar {
            margin-top: 2.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.2rem;
            background: var(--surface-raised);
            border: 1px solid var(--surface-border);
            border-radius: 100px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: status-blink 1.5s ease-in-out infinite;
        }

        @keyframes status-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .status-text {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            color: var(--text-secondary);
        }

        /* --- Footer --- */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem;
            text-align: center;
        }

        .footer-text {
            font-size: 0.7rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        /* --- Responsive --- */
        @media (max-width: 480px) {
            .deploy-container { padding: 1.5rem; }
            .beacon { width: 52px; height: 52px; margin-bottom: 2rem; }
        }

        /* --- Reduced motion --- */
        @media (prefers-reduced-motion: reduce) {
            .beacon::before, .beacon::after, .beacon-core, .status-dot {
                animation: none;
            }
            .beacon::before { transform: scale(0.8); opacity: 0.3; }
            .beacon::after { transform: scale(1.1); opacity: 0.15; }
            .beacon-core { opacity: 0.9; }
            .status-dot { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="deploy-container">
        <div class="beacon">
            <div class="beacon-core"></div>
        </div>
        <div class="app-label">Deploying</div>
        <h1 class="heading">APP_DISPLAY_NAME is on its way</h1>
        <p class="body-text">Your app is being installed and configured. This usually takes a few minutes.</p>
        <div class="status-bar">
            <div class="status-dot"></div>
            <span class="status-text">Setting up &mdash; this page refreshes automatically</span>
        </div>
    </div>
    <footer class="footer">
        <span class="footer-text">Powered by Excloud</span>
    </footer>
</body>
</html>
